<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animation Repo</title>
    <link rel="stylesheet" href="tab_file.css">
  </head>
  <body>

    <!-- Tab images (visual only) -->
    <img id="tab-img-dk" class="tab-img tab-dk" src="tab_file/tab_dk.png" alt="DK" draggable="false">
    <img id="tab-img-yk" class="tab-img tab-yk" src="tab_file/tab_yk.png" alt="YK" draggable="false">
    <img id="tab-img-fk" class="tab-img tab-fk" src="tab_file/tab_fk.png" alt="FK" draggable="false">



    <!-- Invisible hotspot buttons layered over each tab ear -->
    <button id="btn-tab-dk" class="tab-hotspot tab-hotspot-dk" aria-label="Open DK tab"></button>
    <button id="btn-tab-yk" class="tab-hotspot tab-hotspot-yk" aria-label="Open YK tab"></button>
    <button id="btn-tab-fk" class="tab-hotspot tab-hotspot-fk" aria-label="Open FK tab"></button>

    <script src="tab_file.js"></script>
  </body>
</html>
